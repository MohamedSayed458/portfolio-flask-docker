version: '3.8'

services:
  web:
    build: .                # Build from Dockerfile in current folder
    ports:
      - "5000:5000"         # Map host port 5000 → container port 5000
    environment:
      - FLASK_ENV=development
    volumes:
      - .:/app              # Sync local files → container (for live reload)
    restart: unless-stopped
