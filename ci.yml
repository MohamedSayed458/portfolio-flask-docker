name: CI Pipeline

# Run on push or pull request to master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Get your code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Prepare Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 3. Build the image
      - name: Build Docker image
        run: docker build -t my-portfolio-app .
      
      # 4. Test: start container + check health endpoint
      - name: Test container health
        run: |
          docker run -d --name test-container -p 5000:5000 my-portfolio-app
          sleep 10
          curl -f http://localhost:5000/health || exit 1
          docker stop test-container && docker rm test-container
